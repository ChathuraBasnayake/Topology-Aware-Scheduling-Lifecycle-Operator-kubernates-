# What this does:
# Creates a 3-node Kubernetes cluster using Kind:
#   - 1 control-plane node (runs API server, etcd, controller-manager, default scheduler)
#   - 2 worker nodes (pre-labeled with different rack/zone for topology testing)
#
# This is ESSENTIAL — you cannot test topology-aware scheduling on a single node.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  # Control plane node
  - role: control-plane

  # Worker 1: Simulates a node in rack-a, zone us-east-1a
  - role: worker
    labels:
      topology.kubernetes.io/zone: us-east-1a
      topology.kubernetes.io/rack: rack-a

  # Worker 2: Simulates a node in rack-b, zone us-east-1b
  - role: worker
    labels:
      topology.kubernetes.io/zone: us-east-1b
      topology.kubernetes.io/rack: rack-b
